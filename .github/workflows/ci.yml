name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-and-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install --yes libcurl4-openssl-dev libxml2-dev ninja-build
      - name: Configure native build
        run: cmake -S . -B build/ci -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build native compiler and tests
        run: cmake --build build/ci --parallel
      - name: Run native tests
        run: ctest --test-dir build/ci --output-on-failure
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install pinned Emscripten SDK
        shell: bash
        run: |
          set -euo pipefail
          emscripten_version=$(tr -d '[:space:]' < .emscripten-version)
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$emscripten_version"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$emscripten_version"
      - name: Build WebAssembly package
        shell: bash
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          ./scripts/build-wasm.sh
      - name: Test JavaScript packages
        run: |
          npm test --prefix packages/tools
          npm test --prefix packages/compiler-wasm
          node --test test/npm/PrepareNpmSnapshotTest.mjs
      - name: Verify snapshot package consumers
        run: |
          node scripts/prepare-npm-snapshot.mjs --timestamp 20260101000000
          node scripts/test-npm-packages.mjs

  request-release-train:
    name: Request coordinated release train
    needs: native-and-packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch compiler revision to language tools
        env:
          RELEASE_DISPATCH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_DISPATCH_TOKEN" ]]; then
            echo "RELEASE_DISPATCH_TOKEN is required for automatic release trains" >&2
            exit 1
          fi
          jq -n \
            --arg event "release-train-requested" \
            --arg compilerSha "$GITHUB_SHA" \
            --arg compilerCiRunId "$GITHUB_RUN_ID" \
            '{event_type: $event, client_payload: {compiler_sha: $compilerSha, compiler_ci_run_id: $compilerCiRunId}}' \
            | curl --fail-with-body --silent --show-error \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $RELEASE_DISPATCH_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                https://api.github.com/repos/edigonzales/interlis-language-tools/dispatches \
                --data-binary @-
