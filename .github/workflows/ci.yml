name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native:
    name: Native (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            static: "OFF"
          - name: macOS ARM64
            os: macos-14
            static: "OFF"
          - name: Windows x86_64
            os: windows-latest
            static: "ON"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Verify Linux architecture
        if: runner.os == 'Linux'
        run: test "$(uname -m)" = "x86_64"
      - name: Verify macOS architecture
        if: runner.os == 'macOS'
        run: test "$(uname -m)" = "arm64"
      - name: Verify Windows architecture
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ([Runtime.InteropServices.RuntimeInformation]::OSArchitecture -ne "X64") {
            throw "x86_64 Windows is required"
          }
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libcurl4-openssl-dev ninja-build
      - name: Configure native build (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B build/ci -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DILIC_STATIC_DISTRIBUTION=${{ matrix.static }}
      - name: Configure native build (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build/ci -A x64 -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DILIC_STATIC_DISTRIBUTION=${{ matrix.static }}
      - name: Build native compiler and tests
        run: cmake --build build/ci --config Release --parallel
      - name: Run native tests
        run: ctest --test-dir build/ci -C Release --output-on-failure
      - name: Verify Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/check-windows-runtime-deps.ps1 -Binary build/ci/Release/ilic.exe

  wasm-and-packages:
    name: WASM and JavaScript packages
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install pinned Emscripten SDK
        shell: bash
        run: |
          set -euo pipefail
          emscripten_version=$(tr -d '[:space:]' < .emscripten-version)
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$emscripten_version"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$emscripten_version"
      - name: Build WebAssembly package
        shell: bash
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          ./scripts/build-wasm.sh
      - name: Test JavaScript packages
        run: |
          npm test --prefix packages/tools
          npm test --prefix packages/compiler-wasm
          node --test test/npm/PrepareNpmSnapshotTest.mjs
      - name: Verify snapshot package consumers
        run: |
          node scripts/prepare-npm-snapshot.mjs --timestamp 20260101000000
          node scripts/test-npm-packages.mjs
