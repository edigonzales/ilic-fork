name: Publish npm snapshot

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-snapshot
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test and publish
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout selected branch or tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install OIDC-capable npm
        run: npm install --global npm@11.18.0

      - name: Install pinned Emscripten SDK
        shell: bash
        run: |
          set -euo pipefail
          emscripten_version=$(tr -d '[:space:]' < .emscripten-version)
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$emscripten_version"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$emscripten_version"

      - name: Build WebAssembly package
        shell: bash
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          ./scripts/build-wasm.sh

      - name: Test source packages and staging logic
        run: |
          npm test --prefix packages/tools
          npm test --prefix packages/compiler-wasm
          node --test test/npm/PrepareNpmSnapshotTest.mjs

      - name: Stage snapshot packages
        id: stage
        run: node scripts/prepare-npm-snapshot.mjs --build-id "$GITHUB_RUN_ID" --github-output "$GITHUB_OUTPUT"

      - name: Verify packed and installed packages
        run: node scripts/test-npm-packages.mjs

      - name: Publish @ilic/tools
        run: npm publish "${{ steps.stage.outputs.tools_directory }}" --access public --tag snapshot

      - name: Publish @ilic/compiler-wasm
        run: npm publish "${{ steps.stage.outputs.compiler_wasm_directory }}" --access public --tag snapshot

      - name: Request language-tools release train
        env:
          RELEASE_DISPATCH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          COMPILER_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          COMPILER_VERSION: ${{ steps.stage.outputs.snapshot_version }}
          COMPILER_CI_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_DISPATCH_TOKEN" ]]; then
            echo "RELEASE_DISPATCH_TOKEN is required for automatic release trains" >&2
            exit 1
          fi
          jq -n \
            --arg event "release-train-requested" \
            --arg compilerSha "$COMPILER_SHA" \
            --arg compilerVersion "$COMPILER_VERSION" \
            --arg compilerPublishRunId "$GITHUB_RUN_ID" \
            --arg compilerCiRunId "$COMPILER_CI_RUN_ID" \
            '{event_type: $event, client_payload: {
              compiler_sha: $compilerSha,
              compiler_version: $compilerVersion,
              compiler_publish_run_id: $compilerPublishRunId,
              compiler_ci_run_id: $compilerCiRunId
            }}' \
            | curl --fail-with-body --silent --show-error \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $RELEASE_DISPATCH_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                https://api.github.com/repos/edigonzales/interlis-language-tools/dispatches \
                --data-binary @-

      - name: Write publication summary
        if: success()
        env:
          BASE_VERSION: ${{ steps.stage.outputs.base_version }}
          SNAPSHOT_VERSION: ${{ steps.stage.outputs.snapshot_version }}
        shell: bash
        run: |
          {
            printf '## npm snapshot published\n\n'
            printf -- '- Git ref: `%s`\n' "$GITHUB_REF"
            printf -- '- Git commit: `%s`\n' "$GITHUB_SHA"
            printf -- '- Base version: `%s`\n' "$BASE_VERSION"
            printf -- '- Snapshot version: `%s`\n\n' "$SNAPSHOT_VERSION"
            printf -- '- [@ilic/tools](https://www.npmjs.com/package/@ilic/tools/v/%s)\n' "$SNAPSHOT_VERSION"
            printf -- '- [@ilic/compiler-wasm](https://www.npmjs.com/package/@ilic/compiler-wasm/v/%s)\n' "$SNAPSHOT_VERSION"
          } >> "$GITHUB_STEP_SUMMARY"
